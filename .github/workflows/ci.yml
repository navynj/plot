name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      # integration tests (ownership, triage, aggregation, seed) run against
      # the Neon DEV branch via this Actions secret; they self-skip loudly if
      # it is absent
      - run: pnpm test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
